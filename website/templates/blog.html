<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | ADRYZE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style id="adryze-global-theme">
        :root {
            --adryze-brand-primary: #EE3923;
            --adryze-brand-accent: #FF4801;
            --adryze-brand-dark: #0B0B0F;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            color: #18181b;
            background-color: #ffffff;
        }

        .text-orange-400,
        .text-orange-500,
        .text-orange-600 { color: #EE3923 !important; }

        .text-orange-700,
        .text-orange-800 { color: #b12a1b !important; }

        .bg-orange-50 { background-color: #fff3ef !important; }
        .bg-orange-100 { background-color: #ffe6df !important; }
        .bg-orange-200 { background-color: #ffd1c4 !important; }
        .bg-orange-500,
        .bg-orange-600 { background-color: #EE3923 !important; }

        .border-orange-100 { border-color: #ffd8cd !important; }
        .border-orange-600 { border-color: #EE3923 !important; }

        .hover\:bg-orange-200:hover { background-color: #ffd1c4 !important; }
        .hover\:bg-orange-700:hover { background-color: #cf301d !important; }
        .hover\:text-orange-600:hover { color: #EE3923 !important; }
        .focus\:ring-orange-400:focus { --tw-ring-color: rgb(238 57 35 / 0.45) !important; }
    </style>
</head>

<body>
    <main style="max-width: 800px; margin: 4rem auto; font-family: 'Inter', sans-serif; padding: 0 1rem;">
        <h1>Blog</h1>
        <p>This page is now connected to the navigation and Django routing.</p>
        <p><a href="/">Back to Home</a></p>
    </main>
</body>

</html>
