<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-zinc-50 text-zinc-900">
    <section class="min-h-screen py-12 px-6">
        <div class="max-w-3xl mx-auto">
            <a href="/"
                class="inline-flex items-center gap-2 text-sm font-semibold text-zinc-600 hover:text-[#EE3923] transition">
                <span>←</span> Back to Home
            </a>

            <div class="mt-6 rounded-3xl border border-zinc-200 bg-white p-8 md:p-10 shadow-sm">
                <div
                    class="inline-flex items-center gap-2 rounded-full border border-[#EE3923]/25 bg-[#FFF0EE] px-4 py-2 text-xs font-semibold tracking-wide text-[#EE3923]">
                    <span class="w-2 h-2 rounded-full bg-[#EE3923]"></span>
                    Contact Form
                </div>

                <h1 class="mt-5 text-3xl md:text-4xl font-extrabold tracking-tight">Let's discuss your project</h1>
                <p class="mt-3 text-zinc-600">Submit your details and we’ll reach out with a tailored plan.</p>

                {% if messages %}
                <div class="mt-6 space-y-2">
                    {% for message in messages %}
                    <div class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-5">
                    {% csrf_token %}

                    <div>
                        <label for="name" class="block text-sm font-semibold mb-2">Full Name *</label>
                        <input id="name" name="name" type="text" required
                            class="w-full rounded-xl border border-zinc-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#EE3923]/30 focus:border-[#EE3923]" />
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-semibold mb-2">Email *</label>
                        <input id="email" name="email" type="email" required
                            class="w-full rounded-xl border border-zinc-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#EE3923]/30 focus:border-[#EE3923]" />
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-semibold mb-2">Phone *</label>
                        <input id="phone" name="phone" type="tel" required
                            class="w-full rounded-xl border border-zinc-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#EE3923]/30 focus:border-[#EE3923]" />
                    </div>

                    <div>
                        <label for="date" class="block text-sm font-semibold mb-2">Preferred Date</label>
                        <input id="date" name="date" type="date"
                            class="w-full rounded-xl border border-zinc-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#EE3923]/30 focus:border-[#EE3923]" />
                    </div>

                    <div class="md:col-span-2">
                        <label for="package" class="block text-sm font-semibold mb-2">Package *</label>
                        <select id="package" name="package" required
                            class="w-full rounded-xl border border-zinc-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#EE3923]/30 focus:border-[#EE3923] bg-white">
                            <option value="" selected disabled>Select a package</option>
                            <option value="1000">1000 items</option>
                            <option value="2000">2000 items</option>
                            <option value="3000">3000 items</option>
                            <option value="custom">Custom items</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label for="message" class="block text-sm font-semibold mb-2">Message</label>
                        <textarea id="message" name="message" rows="5"
                            class="w-full rounded-xl border border-zinc-300 px-4 py-3 outline-none focus:ring-2 focus:ring-[#EE3923]/30 focus:border-[#EE3923]"
                            placeholder="Tell us about your goals"></textarea>
                    </div>

                    <div class="md:col-span-2 pt-2">
                        <button type="submit"
                            class="w-full md:w-auto inline-flex justify-center items-center rounded-xl bg-[#EE3923] px-7 py-3 font-semibold text-white hover:bg-[#d7331e] transition">
                            Submit Lead
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
